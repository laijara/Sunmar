<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Акции и специальные предложения</title>
    <link rel="stylesheet" href="/styles/promotions.css">
</head>
<body>
    <header class="header-wrapper">
        <div class="container">
            <div class="promotions-banner">
                <h1 class="promotions-banner__title">Акции и специальные<br>предложения</h1>
                <picture class="promotions-banner__image">
                    <source srcset="/SunmarPromotionsLogo.svg" type="image/svg+xml" />
                    <img src="/SunmarPromotionsLogo.svg" alt="Логотип акций" />
                </picture>
            </div>
        </div>
    </header>
    <main>
        <section class="promotions-section">
            <div class="container">
                <nav class="promo-tabs">
                    <button class="tab active" type="button">Все акции</button>
                    <button class="tab" type="button">Лучшие</button>
                    <button class="tab" type="button">По отелям</button>
                    <button class="tab" type="button">По направлениям</button>
                    <button class="tab" type="button">SunmarBonus</button>
                    <button class="tab" type="button">Другие</button>
                </nav>
                <ul class="promo-grid">
                </ul>
            </div>
        </section>
    </main>
</body>
</html>
